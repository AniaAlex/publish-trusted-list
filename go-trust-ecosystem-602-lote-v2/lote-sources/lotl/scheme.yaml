# LOTL (List of Trusted Lists) Scheme Configuration
# Master list pointing to all entity-type-specific LoTEs
# Based on ETSI TS 119 602 (LoLoTE pattern)

operatorNames:
  - language: en
    value: "EUDI Trust Ecosystem Master Registry"

schemeName:
  - language: en
    value: "EU Trust Ecosystem - List of Trusted Lists"

schemeType: "http://uri.etsi.org/TrstSvc/TrustedList/TSLType/EUlistofthelists"

territory: "EU"

sequenceNumber: 1

schemeInformationURI:
  - language: en
    uri: "https://example.com/trust-ecosystem/lotl"

statusDeterminationApproach: "http://uri.etsi.org/TrstSvc/TrustedList/TSLType/StatusDetn/EUappropriate"

policyOrLegalNotice:
  - language: en
    value: "This is the Master List of Trusted Lists (LOTL) for the EUDI Trust
      Ecosystem. It provides pointers to all entity-type-specific Lists of
      Trusted Entities (LoTEs) under the eIDAS 2.0 framework. The LOTL enables
      hierarchical trust list management and discovery."

distributionPoints:
  - "https://example.com/trust-ecosystem/lotl.json"
  - "https://example.com/trust-ecosystem/lotl.xml"

# Pointers to child LoTEs (populated dynamically during generation)
pointersToOtherLoTEs:
  - location: "https://example.com/trust-ecosystem/pid-providers/lote.json"
    schemeTerritory: "EU"
    schemeType: "https://ewc-consortium.github.io/ewc-trust-list/TrstSvc/Svctype/PID"
    schemeName:
      - language: en
        value: "PID Providers Trust List"

  - location: "https://example.com/trust-ecosystem/lpid-providers/lote.json"
    schemeTerritory: "EU"
    schemeType: "https://ewc-consortium.github.io/ewc-trust-list/TrstSvc/Svctype/LPID"
    schemeName:
      - language: en
        value: "LPID Providers Trust List"

  - location: "https://example.com/trust-ecosystem/qeaa-providers/lote.json"
    schemeTerritory: "EU"
    schemeType: "http://uri.etsi.org/TrstSvc/Svctype/EAA/Q"
    schemeName:
      - language: en
        value: "QEAA Providers Trust List"

  - location: "https://example.com/trust-ecosystem/eaa-providers/lote.json"
    schemeTerritory: "EU"
    schemeType: "http://uri.etsi.org/TrstSvc/Svctype/EAA"
    schemeName:
      - language: en
        value: "EAA Providers Trust List"

  - location: "https://example.com/trust-ecosystem/pub-eaa-providers/lote.json"
    schemeTerritory: "EU"
    schemeType: "http://uri.etsi.org/TrstSvc/Svctype/EAA/Pub-EAA"
    schemeName:
      - language: en
        value: "Public Body EAA Providers Trust List"

  - location: "https://example.com/trust-ecosystem/wallet-providers-np/lote.json"
    schemeTerritory: "EU"
