    value: "EUDI Trust Ecosystem - QEAA Providers Registry"

schemeName:
  - language: en
    value: "List of Trusted Qualified EAA Providers"

schemeType: "http://uri.etsi.org/TrstSvc/Svctype/EAA/Q"

territory: "EU"

sequenceNumber: 1

schemeInformationURI:
  - language: en
    uri: "https://example.com/trust-ecosystem/qeaa-providers"

