# LoTE Scheme for EAA Providers (Electronic Attestation of Attributes)
# Based on ETSI TS 119 602 and EWC RFC 012

operatorNames:
  - language: en
    value: "EUDI Trust Ecosystem - EAA Providers Registry"

schemeName:
  - language: en
    value: "List of Trusted EAA Providers"

schemeType: "http://uri.etsi.org/TrstSvc/Svctype/EAA"

territory: "EU"

sequenceNumber: 1

schemeInformationURI:
  - language: en
    uri: "https://example.com/trust-ecosystem/eaa-providers"

statusDeterminationApproach: "http://uri.etsi.org/TrstSvc/TrustedList/TSLType/StatusDetn/EUappropriate"

policyOrLegalNotice:
  - language: en
    value: "This trust list is operated under the EUDI Trust Framework and eIDAS 2.0 regulation. EAA providers are authorized to issue non-qualified Electronic Attestations of Attributes for various use cases including diploma credentials, professional licenses, and other verifiable credentials."
