# LoTE Scheme for PID Providers (Personal Identity Document)
# Based on ETSI TS 119 602 and EWC RFC 012

operatorNames:
  - language: en
    value: "EUDI Trust Ecosystem - PID Providers Registry"

schemeName:
  - language: en
    value: "List of Trusted PID Providers"

schemeType: "https://ewc-consortium.github.io/ewc-trust-list/TrstSvc/Svctype/PID"

territory: "EU"

sequenceNumber: 1

schemeInformationURI:
  - language: en
    uri: "https://example.com/trust-ecosystem/pid-providers"

