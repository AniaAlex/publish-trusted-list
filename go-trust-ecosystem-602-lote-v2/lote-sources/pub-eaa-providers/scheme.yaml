# LoTE Scheme for Pub-EAA Providers (Public Body Electronic Attestation of Attributes)
# Based on ETSI TS 119 602 and EWC RFC 012

operatorNames:
  - language: en
    value: "EUDI Trust Ecosystem - Public Body EAA Providers Registry"

schemeName:
  - language: en
    value: "List of Trusted Public Body EAA Providers"

schemeType: "http://uri.etsi.org/TrstSvc/Svctype/EAA/Pub-EAA"

territory: "EU"

sequenceNumber: 1

schemeInformationURI:
  - language: en
    uri: "https://example.com/trust-ecosystem/pub-eaa-providers"

statusDeterminationApproach: "http://uri.etsi.org/TrstSvc/TrustedList/TSLType/StatusDetn/EUappropriate"

policyOrLegalNotice:
  - language: en
    value: "This trust list is operated under the EUDI Trust Framework and eIDAS 2.0
      regulation. Pub-EAA providers are public sector bodies authorized to issue
      Electronic Attestations of Attributes as authentic sources of public
      data."
