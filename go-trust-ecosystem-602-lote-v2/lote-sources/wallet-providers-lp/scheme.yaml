# LoTE Scheme for Legal Person Wallet Providers (LPWP)
# Based on ETSI TS 119 602 and EWC RFC 012

operatorNames:
  - language: en
    value: "EUDI Trust Ecosystem - Legal Person Wallet Providers Registry"

schemeName:
  - language: en
    value: "List of Trusted Legal Person Wallet Providers"

schemeType: "https://ewc-consortium.github.io/ewc-trust-list/TrstSvc/Svctype/LPWP"

territory: "EU"

sequenceNumber: 1

schemeInformationURI:
  - language: en
    uri: "https://example.com/trust-ecosystem/wallet-providers-lp"

