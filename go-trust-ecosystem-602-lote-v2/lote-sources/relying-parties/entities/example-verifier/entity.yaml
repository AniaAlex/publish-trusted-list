# Entity configuration for a Relying Party (Verifier)
# Relying Parties verify credentials from EUDI wallet holders

entityId: "https://verifier.example.com/eudi"

entityType: "http://uri.etsi.org/TrstSvc/TrustedList/TSLType/EUgeneric"

names:
  - language: en
    value: "Example Online Service Verifier"
  - language: fi
    value: "Esimerkki Verkkopalvelun Varmentaja"

status: "http://uri.etsi.org/TrstSvc/TrustedList/Svcstatus/granted"

informationURIs:
  - language: en
    uri: "https://verifier.example.com/info"

services:
  - serviceType: "http://uri.etsi.org/TrstSvc/TrustedList/TSLType/EUgeneric"
    serviceNames:
      - language: en
        value: "Credential Verification Service"
    status: "http://uri.etsi.org/TrstSvc/TrustedList/Svcstatus/granted"
    serviceSupplyPoints:
      - "https://verifier.example.com/oid4vp"
      - "https://verifier.example.com/.well-known/openid-configuration"
