# Pipeline for generating signed LoTEs with JWS signatures
# Requires signing keys to be generated first (run generate-certs.sh)
# Run with: tsl-tool pipeline-generate-signed-lotes.yaml

# ==============================================================================
# STEP 1: Generate and sign LoTEs for each entity type
# ==============================================================================

# PID Providers LoTE (signed)
- generate-lote:
    - ./lote-sources/pid-providers
- publish-lote:
    - ./output/signed/pid-providers
    - ./lote-sources/pid-providers/entities/example-pid-issuer/signing-cert.pem
    - ./lote-sources/pid-providers/entities/example-pid-issuer/signing-key.pem

